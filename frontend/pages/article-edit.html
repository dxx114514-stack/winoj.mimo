<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>编辑文章 - WinOJ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/markdown.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="nav"></div>
  <div class="max-w-4xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-6" id="pageTitle">发布文章</h1>
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">标题</label>
        <input id="artTitle" class="w-full px-3 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="文章标题">
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">内容 <span class="text-xs text-gray-400">（支持 Markdown 和 $公式$）</span></label>
        <textarea id="artContent" rows="15" class="w-full px-3 py-2 border border-gray-300 rounded-xl font-mono text-sm text-left focus:ring-2 focus:ring-indigo-500 outline-none resize-none" placeholder="支持 Markdown 语法和 KaTeX/LaTeX 公式"></textarea>
      </div>
      <div class="grid grid-cols-2 gap-4 mb-4">
        <div class="flex items-center space-x-2 cursor-pointer">
          <input type="checkbox" id="artPublished" class="rounded text-indigo-600">
          <span class="text-sm text-gray-700">立即发布</span>
        </div>
        <div>
          <label class="text-xs text-gray-500">提供者</label>
          <input id="artProvider" class="w-full px-3 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm" placeholder="题目/文章来源（选填）">
        </div>
      </div>
      <div class="flex justify-end space-x-3">
        <a href="/pages/articles.html" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-xl">取消</a>
        <button onclick="saveArticle()" class="px-6 py-2 bg-indigo-600 text-white rounded-xl font-semibold hover:bg-indigo-700" id="saveBtn">保存</button>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('nav').innerHTML = renderNav('');
    const params = new URLSearchParams(window.location.search);
    const aid = params.get('id');
    let editing = false;

    async function init() {
      if (aid) {
        editing = true;
        document.getElementById('pageTitle').textContent = '编辑文章';
        try {
          const a = await apiCall('GET', `/articles/${aid}`);
          document.getElementById('artTitle').value = a.title;
          document.getElementById('artContent').value = a.content;
          document.getElementById('artProvider').value = a.provider || '';
          document.getElementById('artPublished').checked = a.is_published;
        } catch (err) { alert(err.message); }
      }
    }

    async function saveArticle() {
      const title = document.getElementById('artTitle').value.trim();
      if (!title) { alert('请输入标题'); return; }
      const content = document.getElementById('artContent').value;
      const provider = document.getElementById('artProvider').value;
      const is_published = document.getElementById('artPublished').checked;
      try {
        if (editing) {
          await apiCall('PUT', `/articles/${aid}`, { title, content, provider, is_published });
        } else {
          await apiCall('POST', '/articles', { title, content, provider, is_published });
        }
        window.location.href = '/pages/articles.html';
      } catch (err) { alert(err.message); }
    }
    init();
  </script>
</body>
</html>
