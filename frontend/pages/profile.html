<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人资料 - WinOJ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/markdown.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="nav"></div>
  <div class="max-w-3xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">个人资料</h1>
    <div id="profile" class="text-center py-8 text-gray-400">加载中...</div>
  </div>
  <script>
    document.getElementById('nav').innerHTML = renderNav('');
    async function loadProfile() {
      try {
        const u = await apiCall('GET', '/users/me');
        document.getElementById('profile').innerHTML = `
          <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
            <div class="flex items-center space-x-4 mb-6">
              <div class="w-16 h-16 rounded-full bg-indigo-100 flex items-center justify-center">
                <span class="text-2xl font-bold text-indigo-600">${escapeHtml((u.nickname || u.username || 'U')[0].toUpperCase())}</span>
              </div>
              <div>
                <h2 class="text-xl font-bold text-gray-900">${escapeHtml(u.nickname || u.username)}</h2>
                <div class="flex items-center space-x-2 mt-1">
                  <span class="text-sm text-gray-500">@${escapeHtml(u.username)}</span>
                  ${roleBadge(u.role)}
                  <span class="px-2 py-0.5 text-xs rounded-full bg-yellow-100 text-yellow-700">Rating: ${u.rating || 1500}</span>
                </div>
              </div>
            </div>

            ${u.signature ? `<div class="mb-4 p-3 bg-gray-50 rounded-xl text-sm text-gray-600 italic border-l-4 border-indigo-300">"${escapeHtml(u.signature)}"</div>` : ''}

            ${u.bio ? `<div class="mb-6"><h3 class="text-sm font-semibold text-gray-700 mb-2">个人简介</h3><div id="bioContent">${renderMarkdown(u.bio)}</div></div>` : ''}

            <div class="text-sm text-gray-400">注册时间: ${new Date(u.created_at).toLocaleDateString()}</div>
          </div>

          <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mt-4">
            <h3 class="font-semibold text-gray-900 mb-4">编辑资料</h3>
            <div class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">昵称</label>
                <input id="edNickname" value="${escapeHtml(u.nickname || '')}" class="w-full px-3 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">个性签名 <span class="text-xs text-gray-400">（最多1000字，支持 D("内容") 动态签名）</span></label>
                <textarea id="edSignature" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-xl font-mono text-sm text-left focus:ring-2 focus:ring-indigo-500 outline-none resize-none">${escapeHtml(u.signature || '')}</textarea>
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">个人简介 <span class="text-xs text-gray-400">（支持 Markdown 和 KaTeX 公式）</span></label>
                <textarea id="edBio" rows="6" class="w-full px-3 py-2 border border-gray-300 rounded-xl font-mono text-sm text-left focus:ring-2 focus:ring-indigo-500 outline-none resize-none" placeholder="# 关于我&#10;&#10;支持 **Markdown** 和 $E=mc^2$ 公式">${escapeHtml(u.bio || '')}</textarea>
              </div>
              <div class="flex justify-end">
                <button onclick="saveProfile()" class="px-6 py-2 bg-indigo-600 text-white rounded-xl font-semibold hover:bg-indigo-700">保存</button>
              </div>
            </div>
          </div>
        `;
        renderMathInElement(document.getElementById('bioContent'));
      } catch (err) {
        document.getElementById('profile').innerHTML = `<p class="text-red-500 text-center">${err.message || '加载失败'}</p>`;
      }
    }

    async function saveProfile() {
      try {
        await apiCall('PUT', '/users/me', {
          nickname: document.getElementById('edNickname').value,
          signature: document.getElementById('edSignature').value,
          bio: document.getElementById('edBio').value
        });
        alert('资料已保存');
        loadProfile();
      } catch (err) { alert(err.message); }
    }

    loadProfile();
  </script>
</body>
</html>
