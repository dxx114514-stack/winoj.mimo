<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>比赛详情 - WinOJ</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class'}</script>
  <script src="/js/api.js"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen">
  <div id="nav"></div>
  <div class="max-w-5xl mx-auto px-4 py-8">
    <div id="content" class="text-center py-12 text-gray-400 dark:text-gray-500 dark:text-gray-400">加载中...</div>
  </div>
  <script>
    document.getElementById('nav').innerHTML = renderNav('contests');
    const params = new URLSearchParams(window.location.search);
    const cid = params.get('id');

    async function loadContest() {
      if (!cid) { document.getElementById('content').innerHTML = '<p class="text-red-500">未指定比赛 ID</p>'; return; }
      try {
        const c = await apiCall('GET', `/contests/${cid}`);
        document.title = `${c.title} - WinOJ`;

        const now = new Date();
        const start = new Date(c.start_time);
        const end = new Date(c.end_time);
        let status = '未开始', statusColor = 'bg-blue-50 text-blue-700';
        if (now >= start && now <= end) { status = '进行中'; statusColor = 'bg-green-50 text-green-700'; }
        else if (now > end) { status = '已结束'; statusColor = 'bg-gray-100 text-gray-600'; }

        let problemsHtml = '';
        if (c.problems && c.problems.length > 0) {
          problemsHtml = `
            <div class="mt-6">
              <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-3">题目列表</h3>
              <div class="space-y-2">
                ${c.problems.map((p, i) => `
                  <div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-700 rounded-xl">
                    <div class="flex items-center space-x-3">
                      <span class="text-sm font-mono text-gray-500 dark:text-gray-400 dark:text-gray-500">${p.alias || '#' + p.id}</span>
                      <a href="/pages/problem.html?id=${p.id}" class="text-sm font-medium text-indigo-600 dark:text-indigo-400 hover:text-indigo-800">${escapeHtml(p.title)}</a>
                    </div>
                    <div class="flex items-center space-x-3 text-xs text-gray-400 dark:text-gray-500 dark:text-gray-400">
                      <span>时限: ${p.time_limit}ms</span>
                      <span>内存: ${p.memory_limit}MB</span>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          `;
        }

        let leaderboardHtml = '';
        try {
          const lb = await apiCall('GET', `/contests/${cid}/leaderboard`);
          if (lb.leaderboard.length > 0) {
            leaderboardHtml = `
              <div class="mt-8">
                <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-3">排行榜</h3>
                <div class="bg-white dark:bg-gray-800 dark:bg-gray-800 rounded-2xl shadow-sm dark:shadow-gray-900/30 border border-gray-100 dark:border-gray-700 overflow-hidden">
                  <table class="w-full">
                    <thead class="bg-gray-50 dark:bg-gray-700 border-b border-gray-200 dark:border-gray-700">
                      <tr>
                        <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 dark:text-gray-400 dark:text-gray-500 uppercase">排名</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 dark:text-gray-500 uppercase">用户</th>
                        ${lb.problem_ids.map(pid => `<th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 dark:text-gray-400 dark:text-gray-500 uppercase">#${pid}</th>`).join('')}
                        <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 dark:text-gray-400 dark:text-gray-500 uppercase">总分</th>
                        <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 dark:text-gray-400 dark:text-gray-500 uppercase">总耗时</th>
                      </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100 dark:divide-gray-700">
                      ${lb.leaderboard.map(u => `
                        <tr class="hover:bg-gray-50 dark:hover:bg-gray-700 dark:bg-gray-700">
                          <td class="px-4 py-3 text-center">
                            ${u.rank <= 3 ? `<span class="inline-block w-7 h-7 rounded-full text-center leading-7 text-sm font-bold ${u.rank===1?'bg-yellow-100 dark:bg-yellow-900/30 text-yellow-700 dark:text-yellow-300':u.rank===2?'bg-gray-200 text-gray-600 dark:text-gray-400 dark:text-gray-500':'bg-orange-100 dark:bg-orange-900/30 text-orange-700 dark:text-orange-300'}">${u.rank}</span>` : `<span class="text-sm text-gray-500 dark:text-gray-400 dark:text-gray-500">${u.rank}</span>`}
                          </td>
                          <td class="px-4 py-3 text-sm font-medium text-gray-900 dark:text-white">${escapeHtml(u.nickname || u.username)}</td>
                          ${lb.problem_ids.map(pid => {
                            const p = u.problems[pid];
                            return `<td class="px-4 py-3 text-center text-sm">${p ? (p.status==='accepted'?`<span class="text-green-600 dark:text-green-400">${p.score}</span>`:`<span class="text-red-400">X</span>`) : '<span class="text-gray-300">-</span>'}</td>`;
                          }).join('')}
                          <td class="px-4 py-3 text-center text-sm font-bold text-gray-900 dark:text-white">${u.total_score}</td>
                          <td class="px-4 py-3 text-center text-sm text-gray-500 dark:text-gray-400 dark:text-gray-500">${u.total_time}ms</td>
                        </tr>
                      `).join('')}
                    </tbody>
                  </table>
                </div>
              </div>
            `;
          }
        } catch {}

        document.getElementById('content').innerHTML = `
          <div class="bg-white dark:bg-gray-800 dark:bg-gray-800 rounded-2xl shadow-sm dark:shadow-gray-900/30 border border-gray-100 dark:border-gray-700 p-8">
            <div class="flex items-start justify-between mb-4">
              <div>
                <h1 class="text-3xl font-bold text-gray-900 dark:text-white">${escapeHtml(c.title)}</h1>
                <p class="text-gray-500 dark:text-gray-400 dark:text-gray-500 mt-2">${escapeHtml(c.description || '暂无描述')}</p>
              </div>
              <span class="px-3 py-1 text-xs rounded-full font-medium ${statusColor}">${status}</span>
            </div>
            <div class="flex items-center space-x-6 text-sm text-gray-500 dark:text-gray-400 dark:text-gray-500 mb-4">
              <span>题目: ${c.problems?.length || 0} 道</span>
              <span>参赛: ${c.participant_count || 0} 人</span>
              <span>${new Date(c.start_time).toLocaleString()} ~ ${new Date(c.end_time).toLocaleString()}</span>
            </div>
            ${problemsHtml}
            ${leaderboardHtml}
          </div>
        `;
      } catch (err) {
        document.getElementById('content').innerHTML = `<p class="text-red-500 text-center">${err.message || '加载比赛失败'}</p>`;
      }
    }
    loadContest();
  </script>
</body>
</html>
