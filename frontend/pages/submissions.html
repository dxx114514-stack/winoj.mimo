<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>提交记录 - WinOJ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/api.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="nav"></div>
  <div class="max-w-6xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">提交记录</h1>
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
      <table class="w-full">
        <thead class="bg-gray-50 border-b border-gray-200">
          <tr>
            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">ID</th>
            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">用户</th>
            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">题目</th>
            <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 uppercase">语言</th>
            <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 uppercase">状态</th>
            <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 uppercase">得分</th>
            <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 uppercase">耗时</th>
            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">时间</th>
            <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 uppercase">操作</th>
          </tr>
        </thead>
        <tbody id="subList" class="divide-y divide-gray-100"></tbody>
      </table>
      <div id="empty" class="hidden text-center py-12 text-gray-400">暂无提交记录</div>
    </div>
    <div id="pagination" class="flex justify-center mt-6 space-x-2"></div>
  </div>
  <script>
    document.getElementById('nav').innerHTML = renderNav('submissions');
    const currentUser = getUser();
    const isAdmin = currentUser && ['admin', 'su'].includes(currentUser.role);
    let currentPage = 1;
    async function loadSubmissions() {
      if (!getToken()) { window.location.href = '/pages/login.html'; return; }
      try {
        const data = await apiCall('GET', `/submissions?page=${currentPage}&limit=20`);
        const tbody = document.getElementById('subList');
        const empty = document.getElementById('empty');
        if (data.submissions.length === 0) { tbody.innerHTML = ''; empty.classList.remove('hidden'); return; }
        empty.classList.add('hidden');
        tbody.innerHTML = data.submissions.map(s => `
          <tr class="hover:bg-gray-50 transition">
            <td class="px-4 py-3 text-sm font-mono text-gray-500">${s.id}</td>
            <td class="px-4 py-3 text-sm text-gray-700">${escapeHtml(s.username||'-')}</td>
            <td class="px-4 py-3 text-sm text-indigo-600 font-medium"><a href="/pages/problem.html?id=${s.problem_id}" class="hover:underline">${escapeHtml(s.problem_title||'未知')}</a></td>
            <td class="px-4 py-3 text-center text-sm text-gray-600">${s.language}</td>
            <td class="px-4 py-3 text-center"><span class="px-2.5 py-1 text-xs rounded-full font-medium ${statusColor(s.status)}">${statusText(s.status)}</span></td>
            <td class="px-4 py-3 text-center text-sm font-semibold text-gray-900">${s.score}</td>
            <td class="px-4 py-3 text-center text-sm text-gray-600">${s.time_used}ms</td>
            <td class="px-4 py-3 text-sm text-gray-400">${new Date(s.created_at).toLocaleString()}</td>
            <td class="px-4 py-3 text-center">
              <a href="/pages/submission.html?id=${s.id}" class="text-indigo-600 text-sm hover:underline">详情</a>
              ${isAdmin ? `<button onclick="event.stopPropagation(); deleteSubmission(${s.id})" class="ml-2 text-red-500 text-sm hover:underline">删除</button>` : ''}
            </td>
          </tr>
        `).join('');
        const totalPages = Math.ceil(data.total / 20);
        document.getElementById('pagination').innerHTML = Array.from({length: totalPages}, (_, i) => `
          <button onclick="currentPage=${i+1};loadSubmissions()" class="px-3 py-1 rounded-lg text-sm ${i+1===currentPage?'bg-indigo-600 text-white':'bg-white border border-gray-300 text-gray-600 hover:bg-gray-50'}">${i+1}</button>
        `).join('');
      } catch (err) { console.error(err); }
    }

    async function deleteSubmission(id) {
      if (!confirm('确定删除此提交记录？')) return;
      try {
        await apiCall('DELETE', `/submissions/${id}`);
        loadSubmissions();
      } catch (err) { alert(err.message); }
    }

    loadSubmissions();
  </script>
</body>
</html>
