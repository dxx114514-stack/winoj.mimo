<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章 - WinOJ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/markdown.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="nav"></div>
  <div class="max-w-4xl mx-auto px-4 py-8">
    <div id="content" class="text-center py-12 text-gray-400">加载中...</div>
  </div>
  <script>
    document.getElementById('nav').innerHTML = renderNav('');
    const params = new URLSearchParams(window.location.search);
    const aid = params.get('id');
    const user = getUser();

    async function loadArticle() {
      if (!aid) { document.getElementById('content').innerHTML = '<p class="text-red-500">未指定文章 ID</p>'; return; }
      try {
        const a = await apiCall('GET', `/articles/${aid}`);
        document.title = `${a.title} - WinOJ`;
        const isAuthor = user && user.id === a.author_id;
        const canEdit = isAuthor || (user && ['admin', 'su'].includes(user.role));

        document.getElementById('content').innerHTML = `
          <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
            <div class="flex items-start justify-between mb-6">
              <div>
                <h1 class="text-3xl font-bold text-gray-900">${escapeHtml(a.title)}</h1>
                <div class="flex items-center space-x-3 mt-2 text-sm text-gray-500">
                  <span>${escapeHtml(a.nickname || a.username)}</span>
                  <span>·</span>
                  <span>${new Date(a.created_at).toLocaleString()}</span>
                  ${a.is_published ? '' : '<span class="px-2 py-0.5 text-xs rounded-full bg-yellow-100 text-yellow-700">未发布</span>'}
                </div>
              </div>
              ${canEdit ? `
                <div class="flex space-x-2">
                  <a href="/pages/article-edit.html?id=${a.id}" class="px-4 py-1.5 bg-indigo-100 text-indigo-700 text-sm rounded-lg hover:bg-indigo-200">编辑</a>
                  <button onclick="deleteArticle(${a.id})" class="px-4 py-1.5 bg-red-100 text-red-700 text-sm rounded-lg hover:bg-red-200">删除</button>
                </div>
              ` : ''}
            </div>
            <div id="articleContent">${renderMarkdown(a.content)}</div>
          </div>
        `;
        renderMathInElement(document.getElementById('articleContent'));
      } catch (err) {
        document.getElementById('content').innerHTML = `<p class="text-red-500 text-center">${err.message || '加载失败'}</p>`;
      }
    }

    async function deleteArticle(id) {
      if (!confirm('确定删除此文章？')) return;
      try { await apiCall('DELETE', `/articles/${id}`); window.location.href = '/pages/articles.html'; } catch (err) { alert(err.message); }
    }

    loadArticle();
  </script>
</body>
</html>
