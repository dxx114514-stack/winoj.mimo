<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>题库 - WinOJ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class'}</script>
  <script src="/js/api.js"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen">
  <div id="nav"></div>
  <div class="max-w-5xl mx-auto px-4 py-8">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white">题库</h1>
      <div class="flex items-center space-x-3">
        <input id="search" type="text" placeholder="搜索题目..." class="px-4 py-2 border border-gray-300 dark:border-gray-600 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none dark:bg-gray-800 dark:text-white" onkeyup="loadProblems()">
      </div>
    </div>
    <div id="tagFilter" class="mb-4 flex flex-wrap gap-2"></div>
    <div class="bg-white dark:bg-gray-800 dark:bg-gray-800 rounded-2xl shadow-sm dark:shadow-gray-900/30 border border-gray-100 dark:border-gray-700 overflow-hidden">
      <table class="w-full">
        <thead class="bg-gray-50 dark:bg-gray-700 border-b border-gray-200 dark:border-gray-700">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 dark:text-gray-500 uppercase">题号</th>
            <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 dark:text-gray-500 uppercase">标题</th>
            <th class="px-6 py-3 text-center text-xs font-semibold text-gray-500 dark:text-gray-400 dark:text-gray-500 uppercase">标签</th>
            <th class="px-6 py-3 text-center text-xs font-semibold text-gray-500 dark:text-gray-400 dark:text-gray-500 uppercase">时限</th>
            <th class="px-6 py-3 text-center text-xs font-semibold text-gray-500 dark:text-gray-400 dark:text-gray-500 uppercase">内存</th>
            <th class="px-6 py-3 text-center text-xs font-semibold text-gray-500 dark:text-gray-400 dark:text-gray-500 uppercase">类型</th>
            <th class="px-6 py-3 text-center text-xs font-semibold text-gray-500 dark:text-gray-400 dark:text-gray-500 uppercase">操作</th>
          </tr>
        </thead>
        <tbody id="problemList" class="divide-y divide-gray-100 dark:divide-gray-700"></tbody>
      </table>
      <div id="empty" class="hidden text-center py-12 text-gray-400 dark:text-gray-500 dark:text-gray-400">暂无题目</div>
    </div>
    <div id="pagination" class="flex justify-center mt-6 space-x-2"></div>
  </div>
  <script>
    document.getElementById('nav').innerHTML = renderNav('problems');
    let currentPage = 1;
    let selectedTag = '';
    let allTags = [];

    async function loadTags() {
      try {
        allTags = await apiCall('GET', '/tags');
        renderTagFilter();
      } catch (err) {
        console.error('Failed to load tags:', err);
      }
    }

    function renderTagFilter() {
      const container = document.getElementById('tagFilter');
      if (allTags.length === 0) {
        container.innerHTML = '';
        return;
      }
      container.innerHTML = `
        <button onclick="filterByTag('')" class="px-3 py-1 text-xs rounded-full transition ${!selectedTag ? 'bg-indigo-600 text-white' : 'bg-white border border-gray-300 dark:border-gray-600 text-gray-600 dark:text-gray-400 dark:text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-700 dark:bg-gray-700'}">全部</button>
        ${allTags.map(t => `
          <button onclick="filterByTag('${escapeHtml(t.name)}')" class="px-3 py-1 text-xs rounded-full transition ${selectedTag === t.name ? 'text-white' : 'bg-white border border-gray-300 dark:border-gray-600 text-gray-600 dark:text-gray-400 dark:text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-700 dark:bg-gray-700'}" ${selectedTag === t.name ? `style="background-color: ${t.color}"` : ''}>
            ${escapeHtml(t.name)}
          </button>
        `).join('')}
      `;
    }

    function filterByTag(tag) {
      selectedTag = tag;
      currentPage = 1;
      renderTagFilter();
      loadProblems();
    }

    async function loadProblems() {
      const search = document.getElementById('search').value;
      try {
        const params = new URLSearchParams({
          page: currentPage,
          limit: 20,
          search: search
        });
        if (selectedTag) params.append('tag', selectedTag);
        const data = await apiCall('GET', `/problems?${params.toString()}`);
        const tbody = document.getElementById('problemList');
        const empty = document.getElementById('empty');
        if (data.problems.length === 0) {
          tbody.innerHTML = '';
          empty.classList.remove('hidden');
          return;
        }
        empty.classList.add('hidden');
        tbody.innerHTML = data.problems.map(p => `
          <tr class="hover:bg-gray-50 dark:hover:bg-gray-700 dark:bg-gray-700 transition">
            <td class="px-6 py-4 text-sm text-gray-500 dark:text-gray-400 dark:text-gray-500">${p.id}</td>
            <td class="px-6 py-4">
              <a href="/pages/problem.html?id=${p.id}" class="text-indigo-600 dark:text-indigo-400 hover:text-indigo-800 font-medium">${escapeHtml(p.title)}</a>
            </td>
            <td class="px-6 py-4 text-center">
              <div class="flex flex-wrap justify-center gap-1">
                ${(p.tags || []).map(t => `
                  <span class="px-2 py-0.5 text-xs rounded-full" style="background-color: ${t.color}20; color: ${t.color}">${escapeHtml(t.name)}</span>
                `).join('')}
              </div>
            </td>
            <td class="px-6 py-4 text-center text-sm text-gray-600 dark:text-gray-400 dark:text-gray-500">${p.time_limit}ms</td>
            <td class="px-6 py-4 text-center text-sm text-gray-600 dark:text-gray-400 dark:text-gray-500">${p.memory_limit}MB</td>
            <td class="px-6 py-4 text-center">
              <span class="px-2 py-1 text-xs rounded-full bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300">${p.problem_type === 'traditional' ? '传统题' : p.problem_type === 'interactive' ? '交互题' : p.problem_type === 'submit_answer' ? '提交答案' : p.problem_type}</span>
            </td>
            <td class="px-6 py-4 text-center">
              <a href="/pages/submit.html?id=${p.id}" class="px-3 py-1.5 bg-indigo-600 text-white text-sm rounded-lg hover:bg-indigo-700">提交</a>
            </td>
          </tr>
        `).join('');
        const totalPages = Math.ceil(data.total / 20);
        const pag = document.getElementById('pagination');
        pag.innerHTML = Array.from({length: totalPages}, (_, i) => `
          <button onclick="currentPage=${i+1};loadProblems()" class="px-3 py-1 rounded-lg text-sm ${i+1===currentPage?'bg-indigo-600 text-white':'bg-white border border-gray-300 dark:border-gray-600 text-gray-600 dark:text-gray-400 dark:text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-700 dark:bg-gray-700'}">${i+1}</button>
        `).join('');
      } catch (err) {
        console.error(err);
      }
    }

    loadTags();
    loadProblems();
  </script>
</body>
</html>
