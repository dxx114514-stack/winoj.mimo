<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WinOJ - 在线评测系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class'}</script>
  <script src="/js/api.js"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen">
  <div id="nav"></div>
  <div class="max-w-7xl mx-auto px-4 py-12">
    <div class="text-center mb-16">
      <h1 class="text-5xl font-bold text-gray-900 mb-4">WinOJ</h1>
      <p class="text-xl text-gray-600 mb-8">Windows 在线评测系统</p>
      <div class="flex justify-center space-x-4">
        <a href="/pages/problems.html" class="px-8 py-3 bg-indigo-600 text-white rounded-xl text-lg font-semibold hover:bg-indigo-700 shadow-lg hover:shadow-xl transition-all">开始刷题</a>
        <a href="/pages/ide.html" class="px-8 py-3 bg-white text-indigo-600 border-2 border-indigo-600 rounded-xl text-lg font-semibold hover:bg-indigo-50 transition-all">在线编程</a>
      </div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      <div class="bg-white rounded-2xl p-8 shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
        <div class="w-12 h-12 bg-indigo-100 rounded-xl flex items-center justify-center mb-4">
          <svg class="w-6 h-6 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        </div>
        <h3 class="text-xl font-bold text-gray-900 mb-2">多语言支持</h3>
        <p class="text-gray-600">支持 C、C++、Python、Java、JavaScript 等语言，可通过管理面板动态配置。</p>
      </div>
      <div class="bg-white rounded-2xl p-8 shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
        <div class="w-12 h-12 bg-green-100 rounded-xl flex items-center justify-center mb-4">
          <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
        </div>
        <h3 class="text-xl font-bold text-gray-900 mb-2">安全沙箱</h3>
        <p class="text-gray-600">Windows 沙箱隔离，CPU、内存、IO 限制，确保代码安全运行。</p>
      </div>
      <div class="bg-white rounded-2xl p-8 shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
        <div class="w-12 h-12 bg-purple-100 rounded-xl flex items-center justify-center mb-4">
          <svg class="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        </div>
        <h3 class="text-xl font-bold text-gray-900 mb-2">在线 IDE</h3>
        <p class="text-gray-600">浏览器内代码编辑器，支持语法高亮，即时运行，自定义输入。</p>
      </div>
    </div>
    <div class="mt-16 grid grid-cols-2 md:grid-cols-4 gap-6 text-center">
      <div class="bg-white rounded-xl p-6 shadow-sm" id="stat-problems"><div class="text-3xl font-bold text-indigo-600">-</div><div class="text-gray-500 mt-1">题目</div></div>
      <div class="bg-white rounded-xl p-6 shadow-sm" id="stat-submissions"><div class="text-3xl font-bold text-green-600">-</div><div class="text-gray-500 mt-1">提交</div></div>
      <div class="bg-white rounded-xl p-6 shadow-sm" id="stat-users"><div class="text-3xl font-bold text-purple-600">-</div><div class="text-gray-500 mt-1">用户</div></div>
      <div class="bg-white rounded-xl p-6 shadow-sm" id="stat-languages"><div class="text-3xl font-bold text-orange-600">-</div><div class="text-gray-500 mt-1">语言</div></div>
    </div>
  </div>
  <script>
    document.getElementById('nav').innerHTML = renderNav('home');
    async function loadStats() {
      try {
        const data = await apiCall('GET', '/stats');
        document.getElementById('stat-problems').querySelector('.text-3xl').textContent = data.problems;
        document.getElementById('stat-submissions').querySelector('.text-3xl').textContent = data.submissions;
        document.getElementById('stat-users').querySelector('.text-3xl').textContent = data.users;
        document.getElementById('stat-languages').querySelector('.text-3xl').textContent = data.languages;
      } catch {}
    }
    loadStats();
  </script>
</body>
</html>
