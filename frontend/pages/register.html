<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - WinOJ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/api.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="nav"></div>
  <div class="max-w-md mx-auto mt-16 px-4">
    <div class="bg-white rounded-2xl shadow-lg p-8 border border-gray-100">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900">创建账户</h1>
        <p class="text-gray-500 mt-2">加入 WinOJ，开始编程之旅</p>
      </div>
      <div id="error" class="hidden mb-4 p-3 bg-red-50 text-red-700 rounded-lg text-sm"></div>
      <form onsubmit="handleRegister(event)">
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
          <input id="username" type="text" required minlength="3" maxlength="32" class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" placeholder="3-32 个字符">
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">昵称</label>
          <input id="nickname" type="text" class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" placeholder="选填">
        </div>
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
          <input id="password" type="password" required minlength="6" class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" placeholder="至少 6 个字符">
        </div>
        <button type="submit" id="regBtn" class="w-full py-2.5 bg-indigo-600 text-white rounded-xl font-semibold hover:bg-indigo-700 transition">创建账户</button>
      </form>
      <p class="text-center mt-6 text-sm text-gray-500">已有账号？<a href="/pages/login.html" class="text-indigo-600 hover:text-indigo-800 font-medium">立即登录</a></p>
    </div>
  </div>
  <script>
    document.getElementById('nav').innerHTML = renderNav('');
    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('regBtn');
      const errDiv = document.getElementById('error');
      btn.disabled = true; btn.textContent = '创建中...';
      errDiv.classList.add('hidden');
      try {
        const data = await apiCall('POST', '/auth/register', {
          username: document.getElementById('username').value,
          password: document.getElementById('password').value,
          nickname: document.getElementById('nickname').value
        });
        setToken(data.access_token);
        setUser(data.user);
        window.location.href = '/pages/index.html';
      } catch (err) {
        errDiv.textContent = err.message || '注册失败';
        errDiv.classList.remove('hidden');
        btn.disabled = false; btn.textContent = '创建账户';
      }
    }
  </script>
</body>
</html>
