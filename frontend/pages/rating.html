<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rating 排行榜 - WinOJ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/api.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="nav"></div>
  <div class="max-w-3xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Rating 排行榜</h1>
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
      <table class="w-full">
        <thead class="bg-gray-50 border-b border-gray-200">
          <tr>
            <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 uppercase">排名</th>
            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">用户</th>
            <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 uppercase">Rating</th>
            <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 uppercase">等级</th>
          </tr>
        </thead>
        <tbody id="ratingList" class="divide-y divide-gray-100"></tbody>
      </table>
      <div id="empty" class="hidden text-center py-12 text-gray-400">暂无数据</div>
    </div>
    <div id="pagination" class="flex justify-center mt-6 space-x-2"></div>
  </div>
  <script>
    document.getElementById('nav').innerHTML = renderNav('');
    let currentPage = 1;

    function getRatingLevel(rating) {
      if (rating >= 2400) return { text: '大师', color: 'text-red-600 bg-red-50' };
      if (rating >= 2100) return { text: '专家', color: 'text-purple-600 bg-purple-50' };
      if (rating >= 1800) return { text: '高手', color: 'text-blue-600 bg-blue-50' };
      if (rating >= 1500) return { text: '进阶', color: 'text-green-600 bg-green-50' };
      if (rating >= 1200) return { text: '入门', color: 'text-yellow-600 bg-yellow-50' };
      return { text: '新手', color: 'text-gray-600 bg-gray-50' };
    }

    async function loadRating() {
      try {
        const data = await apiCall('GET', `/users/rating?page=${currentPage}&limit=20`);
        const tbody = document.getElementById('ratingList');
        const empty = document.getElementById('empty');
        if (data.users.length === 0) { tbody.innerHTML = ''; empty.classList.remove('hidden'); return; }
        empty.classList.add('hidden');
        tbody.innerHTML = data.users.map((u, i) => {
          const rank = (currentPage - 1) * 20 + i + 1;
          const level = getRatingLevel(u.rating || 1500);
          return `
            <tr class="hover:bg-gray-50">
              <td class="px-4 py-3 text-center">
                ${rank <= 3 ? `<span class="inline-block w-7 h-7 rounded-full text-center leading-7 text-sm font-bold ${rank===1?'bg-yellow-100 text-yellow-700':rank===2?'bg-gray-200 text-gray-600':'bg-orange-100 text-orange-700'}">${rank}</span>` : `<span class="text-sm text-gray-500">${rank}</span>`}
              </td>
              <td class="px-4 py-3">
                <span class="font-medium text-gray-900">${escapeHtml(u.nickname || u.username)}</span>
                <span class="text-sm text-gray-400 ml-2">@${escapeHtml(u.username)}</span>
              </td>
              <td class="px-4 py-3 text-center font-bold text-lg ${u.rating >= 1500 ? 'text-indigo-600' : 'text-gray-600'}">${u.rating || 1500}</td>
              <td class="px-4 py-3 text-center"><span class="px-2 py-0.5 text-xs rounded-full ${level.color}">${level.text}</span></td>
            </tr>
          `;
        }).join('');
        const totalPages = Math.ceil(data.total / 20);
        document.getElementById('pagination').innerHTML = Array.from({length: totalPages}, (_, i) => `
          <button onclick="currentPage=${i+1};loadRating()" class="px-3 py-1 rounded-lg text-sm ${i+1===currentPage?'bg-indigo-600 text-white':'bg-white border border-gray-300 text-gray-600 hover:bg-gray-50'}">${i+1}</button>
        `).join('');
      } catch (err) { console.error(err); }
    }
    loadRating();
  </script>
</body>
</html>
