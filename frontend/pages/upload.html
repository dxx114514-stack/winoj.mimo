<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图床 - WinOJ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class'}</script>
  <script src="/js/api.js"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen">
  <div id="nav"></div>
  <div class="max-w-3xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">文件上传 / 图床</h1>
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-6">
      <p class="text-sm text-gray-500 mb-4">上传图片或文件，获取 URL 用于在 Markdown 中引用。支持格式：jpg/png/gif/webp/svg/pdf/zip/txt/md 等，最大 10MB。</p>
      <div id="dropZone" class="border-2 border-dashed border-gray-300 rounded-xl p-12 text-center cursor-pointer hover:border-indigo-400 hover:bg-indigo-50 transition" onclick="document.getElementById('fileInput').click()">
        <svg class="w-12 h-12 text-gray-400 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
        <p class="text-gray-500">点击或拖拽文件到此处上传</p>
        <input id="fileInput" type="file" class="hidden" onchange="uploadFile(this.files[0])">
      </div>
      <div id="uploadProgress" class="hidden mt-4">
        <div class="w-full bg-gray-200 rounded-full h-2"><div id="progressBar" class="bg-indigo-600 h-2 rounded-full transition-all" style="width:0%"></div></div>
        <p class="text-sm text-gray-500 mt-2" id="progressText">上传中...</p>
      </div>
      <div id="uploadResult" class="hidden mt-4 p-4 bg-green-50 rounded-xl">
        <p class="text-sm text-green-700 font-medium mb-2">上传成功！</p>
        <div class="flex items-center space-x-2">
          <input id="fileUrl" readonly class="flex-1 px-3 py-2 bg-white border border-gray-300 rounded-lg text-sm font-mono">
          <button onclick="copyUrl()" class="px-3 py-2 bg-indigo-600 text-white text-sm rounded-lg hover:bg-indigo-700">复制</button>
        </div>
        <p class="text-xs text-gray-400 mt-2">Markdown 中使用: ![](URL) 或 [链接文本](URL)</p>
        <div id="filePreview" class="mt-3"></div>
      </div>
    </div>
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-6">
      <h3 class="font-semibold text-gray-900 mb-3">使用说明</h3>
      <div class="text-sm text-gray-600 space-y-2">
        <p><strong>插入图片：</strong><code class="bg-gray-100 px-1.5 py-0.5 rounded text-xs">![描述](/uploads/文件名)</code></p>
        <p><strong>插入链接：</strong><code class="bg-gray-100 px-1.5 py-0.5 rounded text-xs">[链接文本](/uploads/文件名)</code></p>
        <p><strong>题目描述中：</strong>支持 Markdown 语法和 KaTeX 公式，行内公式 <code class="bg-gray-100 px-1.5 py-0.5 rounded text-xs">$E=mc^2$</code>，块级公式 <code class="bg-gray-100 px-1.5 py-0.5 rounded text-xs">$$\sum_{i=1}^{n}$$</code></p>
      </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <h3 class="font-semibold text-gray-900 mb-3">我的文件</h3>
      <div id="myFiles" class="space-y-2"></div>
    </div>
  </div>
  <script>
    document.getElementById('nav').innerHTML = renderNav('');
    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('border-indigo-400', 'bg-indigo-50'); });
    dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('border-indigo-400', 'bg-indigo-50'); });
    dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('border-indigo-400', 'bg-indigo-50'); if (e.dataTransfer.files.length) uploadFile(e.dataTransfer.files[0]); });

    async function uploadFile(file) {
      if (!file) return;
      const user = getUser();
      if (!user) { alert('请先登录'); return; }
      document.getElementById('uploadProgress').classList.remove('hidden');
      document.getElementById('uploadResult').classList.add('hidden');
      document.getElementById('progressText').textContent = `上传中... ${file.name}`;
      document.getElementById('progressBar').style.width = '30%';
      try {
        const formData = new FormData();
        formData.append('file', file);
        const res = await fetch('/api/v1/uploads', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${getToken()}` },
          body: formData
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || '上传失败');
        document.getElementById('progressBar').style.width = '100%';
        document.getElementById('progressText').textContent = '上传完成';
        document.getElementById('uploadResult').classList.remove('hidden');
        document.getElementById('fileUrl').value = data.url;
        const ext = file.name.split('.').pop().toLowerCase();
        const preview = document.getElementById('filePreview');
        if (['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext)) {
          preview.innerHTML = `<img src="${data.url}" class="max-h-48 rounded-lg">`;
        } else {
          preview.innerHTML = `<p class="text-sm text-gray-500">📄 ${escapeHtml(file.original_name)} (${(file.size/1024).toFixed(1)}KB)</p>`;
        }
      } catch (err) {
        document.getElementById('progressText').textContent = '上传失败: ' + err.message;
        document.getElementById('progressBar').style.width = '0%';
      }
    }

    function copyUrl() {
      const url = document.getElementById('fileUrl').value;
      navigator.clipboard.writeText(url).then(() => alert('已复制到剪贴板'));
    }

    async function loadMyFiles() {
      try {
        const data = await apiCall('GET', '/uploads?limit=50');
        const el = document.getElementById('myFiles');
        if (!data.files || data.files.length === 0) { el.innerHTML = '<div class="text-gray-400 text-sm py-2">暂无文件</div>'; return; }
        el.innerHTML = data.files.map(f => `
          <div class="flex items-center justify-between p-3 bg-gray-50 rounded-xl">
            <div class="flex items-center space-x-3">
              <a href="/uploads/${f.filename}" target="_blank" class="text-indigo-600 text-sm hover:underline">${escapeHtml(f.original_name)}</a>
              <span class="text-xs text-gray-400">${(f.size/1024).toFixed(1)}KB</span>
            </div>
            <div class="flex items-center space-x-2">
              <button onclick="copyFileUrl('/uploads/${f.filename}')" class="text-xs text-indigo-600 hover:underline">复制URL</button>
            </div>
          </div>
        `).join('');
      } catch {}
    }

    function copyFileUrl(url) {
      navigator.clipboard.writeText(url).then(() => alert('已复制'));
    }

    loadMyFiles();
  </script>
</body>
</html>
